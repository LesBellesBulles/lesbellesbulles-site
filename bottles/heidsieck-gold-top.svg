<svg viewBox="0 0 200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F2A35" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#33485B" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#33485B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#161E26" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="capsule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AD4A" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#D4AD4A"/>
      <stop offset="100%" stop-color="#D4AD4A" stop-opacity="0.78"/>
    </linearGradient>
  </defs>
  
  
  <!-- Bottle body (silhouette only, no overlapping text) -->
  <!-- Neck -->
  <path d="M88 30 L88 125 L112 125 L112 30 Z" fill="url(#glass)" stroke="#0a0f14" stroke-width="0.6"/>
  <!-- Shoulder transition -->
  <path d="M88 125 Q88 135 80 145 Q70 158 65 185 L65 450 Q65 461 76 461 L124 461 Q135 461 135 450 L135 185 Q130 158 120 145 Q112 135 112 125 Z" fill="url(#glass)" stroke="#0a0f14" stroke-width="0.6"/>
  
  <!-- Capsule (foil over neck) -->
  <path d="M86 30 L86 110 L114 110 L114 30 Z" fill="url(#capsule)" stroke="#0a0f14" stroke-width="0.4"/>
  <line x1="86" y1="110" x2="114" y2="110" stroke="#0a0f14" stroke-width="0.6"/>
  
  <!-- Subtle highlight stripe on bottle -->
  <path d="M73 200 Q70 300 73 400" stroke="rgba(255,255,255,0.16)" stroke-width="2.5" fill="none"/>
  <path d="M127 200 Q130 300 127 400" stroke="rgba(0,0,0,0.18)" stroke-width="1.5" fill="none"/>
  
  <!-- Label -->
  <rect x="62" y="280" width="76" height="125" fill="#F7EBC8" stroke="#6B4F1F" stroke-width="0.5" opacity="0.97"/>
  <line x1="68" y1="290" x2="132" y2="290" stroke="#6B4F1F" stroke-width="0.4" opacity="0.5"/>
  <line x1="68" y1="395" x2="132" y2="395" stroke="#6B4F1F" stroke-width="0.4" opacity="0.5"/>
  
  <text x="100" y="306" font-family="Playfair Display,serif" font-size="9" fill="#6B4F1F" text-anchor="middle" letter-spacing="1.4" opacity="0.85">CHAMPAGNE</text>
  <text x="100" y="328" font-family="Playfair Display,serif" font-weight="600" font-size="14" fill="#6B4F1F" text-anchor="middle" letter-spacing="0.6">MONOPOLE</text>
  <text x="100" y="345" font-family="Playfair Display,serif" font-style="italic" font-size="10" fill="#6B4F1F" text-anchor="middle" letter-spacing="0.6" opacity="0.85">MILLÉSIMÉ</text>
  <text x="100" y="385" font-family="Lato,sans-serif" font-size="8" fill="#6B4F1F" text-anchor="middle" letter-spacing="2.2" opacity="0.85">GOLD TOP</text>
</svg>